                    <div className="space-y-12">
                      {userData.experience.map((job) => (
                        <div key={job.id} className="relative pl-8 border-l-2 border-blue-200 hover:border-blue-500 transition-colors">
                          <div className="absolute -left-[9px] top-0 w-4 h-4 rounded-full bg-blue-500 ring-4 ring-white"></div>
                          <div className="mb-1 text-sm text-blue-600 font-bold uppercase tracking-wider">{job.period}</div>
                          <h3 className="text-xl font-bold text-slate-800">{job.role}</h3>
                          <div className="text-md text-slate-500 font-medium mb-3">{job.company}</div>
                          
                          <div className="mb-4">
                            {renderDescription(job.description)}
                          </div>
                          
                          {job.image && (
                            <div className="mt-4">
                              <img src={job.image} alt={`${job.company} work`} className="w-full h-auto max-h-96 object-contain rounded-lg shadow-sm border border-slate-100 bg-white" 
                                onError={(e) => { e.target.style.display = 'none'; }} />
                            </div>
                          )}
                        </div>
                      ))}
                    </div>
                  </div>
                );

              case 'internships':
                return (
                  <div className="animate-fadeIn">
                    <h2 className="text-3xl font-bold text-slate-800 mb-6 border-b pb-4">Internship Experience</h2>
                    <div className="space-y-12">
                      {userData.internships.map((job) => (
                        <div key={job.id} className="relative pl-8 border-l-2 border-purple-200 hover:border-purple-500 transition-colors">
                          <div className="absolute -left-[9px] top-0 w-4 h-4 rounded-full bg-purple-500 ring-4 ring-white"></div>
                          <div className="mb-1 text-sm text-purple-600 font-bold uppercase tracking-wider">{job.period}</div>
                          <h3 className="text-xl font-bold text-slate-800">{job.role}</h3>
                          <div className="text-md text-slate-500 font-medium mb-3">{job.company}</div>
                          
                          <div className="mb-4">
                            {renderDescription(job.description)}
                          </div>

                          {job.image && (
                            <div className="mt-4">
                              <img src={job.image} alt={`${job.company} work`} className="w-full h-auto max-h-96 object-contain rounded-lg shadow-sm border border-slate-100 bg-white" 
                                onError={(e) => { e.target.style.display = 'none'; }} />
                            </div>
                          )}
                        </div>
                      ))}
                    </div>
                  </div>
                );

              case 'selectedProjects':
                return (
                  <div className="animate-fadeIn">
                    <h2 className="text-3xl font-bold text-slate-800 mb-6 border-b pb-4">Selected Projects</h2>
                    <div className="space-y-12">
                      {userData.selectedProjects.map((project) => (
                        <div key={project.id} className="relative pl-8 border-l-2 border-emerald-200 hover:border-emerald-500 transition-colors">
                          <div className="absolute -left-[9px] top-0 w-4 h-4 rounded-full bg-emerald-500 ring-4 ring-white"></div>
                          <div className="mb-1 text-sm text-emerald-600 font-bold uppercase tracking-wider">{project.period}</div>
                          <div className="flex justify-between items-start mb-3">
                              <h3 className="text-xl font-bold text-slate-800">{project.title}</h3>
                              {project.link ? (
                                  <a href={project.link} target="_blank" rel="noopener noreferrer" className="text-blue-500 hover:text-blue-700 transition-colors p-1 hover:bg-slate-50 rounded-full">
                                      <ExternalLink size={20}/>
                                  </a>
                              ) : (
                                  <span className="text-slate-300 p-1 cursor-not-allowed" title="No link available">
                                      <ExternalLink size={20}/>
                                  </span>
                              )}
                          </div>
                          <div className="mb-4">
                            {renderDescription(project.description)}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                );

              case 'openSourceTools':
                return (
                  <div className="animate-fadeIn">
                    <h2 className="text-3xl font-bold text-slate-800 mb-6 border-b pb-4">Open-Source Tools</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                      {userData.openSourceTools.map((project) => (
                        <div key={project.id} className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm hover:shadow-md transition-shadow flex flex-col">
                          <div className="flex justify-between items-start mb-4">
                            <h3 className="text-xl font-bold text-slate-800">{project.title}</h3>
                            {project.link ? (
                              <a href={project.link} target="_blank" rel="noopener noreferrer" className="text-blue-500 hover:text-blue-700 transition-colors p-1 hover:bg-slate-50 rounded-full">
                                <ExternalLink size={20}/>
                              </a>
                            ) : (
                              <span className="text-slate-300 p-1 cursor-not-allowed" title="No link available">
                                <ExternalLink size={20}/>
                              </span>
                            )}
                          </div>
                          
                          <p className="text-slate-600 mb-4 flex-grow">{project.description}</p>
                          
                          <div className="flex flex-wrap gap-2 mt-auto">
                            {project.tech.map((t, i) => (
                              <span key={i} className="text-xs font-mono bg-slate-100 text-slate-600 px-2 py-1 rounded">{t}</span>
                            ))}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                );

              case 'publications':
                const uniqueYears = [...new Set(userData.publications.map(p => p.year))].sort((a, b) => b - a);
                const filteredPubs = userData.publications.filter(pub => {
                    const matchesRole = pubRoleFilter === 'all' || 
                        (pubRoleFilter === 'first' && isFirstAuthor(pub.authors)) ||
                        (pubRoleFilter === 'co' && !isFirstAuthor(pub.authors));
                    const matchesYear = pubYearFilter === 'all' || pub.year === pubYearFilter;
                    return matchesRole && matchesYear;
                });

                return (
                  <div className="animate-fadeIn">
                    <div className="flex flex-col md:flex-row md:items-end justify-between mb-6 border-b pb-4 gap-4">
                        <h2 className="text-3xl font-bold text-slate-800">Publications</h2>
                        <div className="text-sm font-medium text-slate-500">
                            Showing {filteredPubs.length} of {userData.publications.length} papers
                        </div>
                    </div>

                    <div className="bg-white border border-slate-200 rounded-xl p-4 mb-8 shadow-sm">
                        <div className="flex items-center gap-2 mb-4 text-slate-800 font-semibold">
                            <Filter size={18} className="text-blue-600" />
                            <span>Filters</span>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Author Role</label>
                                <div className="flex flex-wrap gap-2">
                                    {[
                                        { id: 'all', label: 'All' },
                                        { id: 'first', label: 'First Author' },
                                        { id: 'co', label: 'Co-Author' }
                                    ].map(role => (
                                        <button 
                                            key={role.id}
                                            onClick={() => setPubRoleFilter(role.id)}
                                            className={`px-3 py-1.5 rounded-md text-sm font-medium transition-all ${
                                                pubRoleFilter === role.id 
                                                ? 'bg-blue-600 text-white shadow-sm' 
                                                : 'bg-slate-50 text-slate-600 hover:bg-slate-100 border border-slate-200'
                                            }`}
                                        >
                                            {role.label}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Publication Year</label>
                                <div className="flex flex-wrap gap-2">
                                    <button 
                                        onClick={() => setPubYearFilter('all')}
                                        className={`px-3 py-1.5 rounded-md text-sm font-medium transition-all ${
                                            pubYearFilter === 'all' 
                                            ? 'bg-blue-600 text-white shadow-sm' 
                                            : 'bg-slate-50 text-slate-600 hover:bg-slate-100 border border-slate-200'
                                        }`}
                                    >
                                        All
                                    </button>
                                    {uniqueYears.map(year => (
                                        <button 
                                            key={year}
                                            onClick={() => setPubYearFilter(year)}
                                            className={`px-3 py-1.5 rounded-md text-sm font-medium transition-all ${
                                                pubYearFilter === year 
                                                ? 'bg-blue-600 text-white shadow-sm' 
                                                : 'bg-slate-50 text-slate-600 hover:bg-slate-100 border border-slate-200'
                                            }`}
                                        >
                                            {year}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="space-y-4">
                      {filteredPubs.length > 0 ? (
                        filteredPubs.map((pub) => (
                            <div key={pub.id} className="group flex flex-col p-5 bg-white rounded-lg border border-slate-200 hover:border-blue-300 hover:shadow-md transition-all">
                            <div className="flex justify-between items-start">
                                <div className="flex-1">
                                    <div className="flex items-center gap-2 mb-1">
                                        <span className={`text-[10px] uppercase font-bold px-1.5 py-0.5 rounded ${
                                            isFirstAuthor(pub.authors) 
                                            ? 'bg-blue-100 text-blue-700' 
                                            : 'bg-slate-100 text-slate-600'
                                        }`}>
                                            {isFirstAuthor(pub.authors) ? 'First Author' : 'Co-Author'}
                                        </span>
                                    </div>
                                    <h3 className="text-lg font-semibold text-slate-800 group-hover:text-blue-600 transition-colors leading-tight">{pub.title}</h3>
                                    {renderAuthors(pub.authors)}
                                    <div className="text-slate-500 mt-2 flex items-center gap-2 text-sm">
                                        <span className="font-medium text-slate-700">{pub.publisher}</span>
                                        <span className="w-1 h-1 bg-slate-400 rounded-full"></span>
                                        <span>{pub.year}</span>
                                    </div>
                                </div>
                                {pub.link ? (
                                    <a href={pub.link} target="_blank" rel="noopener noreferrer" className="text-blue-500 hover:text-blue-700 ml-4 p-2 hover:bg-slate-50 rounded-full transition-colors">
                                        <ExternalLink size={18} />
                                    </a>
                                ) : (
                                    <span className="text-slate-300 ml-4 p-2 cursor-not-allowed" title="No link available">
                                        <ExternalLink size={18} />
                                    </span>
                                )}
                            </div>
                            </div>
                        ))
                      ) : (
                        <div className="text-center py-20 bg-slate-50 rounded-xl border border-dashed border-slate-300">
                            <p className="text-slate-500">No publications found matching the selected filters.</p>
                            <button onClick={() => {setPubRoleFilter('all'); setPubYearFilter('all');}} className="mt-4 text-blue-600 font-semibold hover:underline">Clear all filters</button>
                        </div>
                      )}
                    </div>
                  </div>
                );
                
              case 'presentations':
                return (
                  <div className="animate-fadeIn">
                    <h2 className="text-3xl font-bold text-slate-800 mb-6 border-b pb-4">Presentations</h2>
                    <div className="space-y-4">
                      {userData.presentations.map((pres) => (
                        <div key={pres.id} className="p-5 bg-white rounded-lg border-l-4 border-indigo-500 shadow-sm flex flex-col">
                          <div className="flex items-center justify-between">
                            <div>
                                <h3 className="text-lg font-bold text-slate-800">{pres.title}</h3>
                                <div className="text-slate-600 mt-1">{pres.role}</div>
                            </div>
                            <div className="text-indigo-600 font-bold bg-indigo-50 px-3 py-1 rounded-full text-sm">
                                {pres.year}
                            </div>
                          </div>
                          
                          {pres.image && (
                            <div className="mt-4">
                              <img src={pres.image} alt={pres.title} className="w-full h-auto max-h-96 object-contain rounded-lg shadow-sm border border-slate-100 bg-white" 
                                onError={(e) => { e.target.style.display = 'none'; }} />
                            </div>
                          )}
                        </div>
                      ))}
                    </div>
                  </div>
                );

              default: return null;
            }
          };

          return (
            <div className="min-h-screen bg-slate-50 flex flex-col md:flex-row font-sans text-slate-900">
              <div className="md:hidden bg-white p-4 shadow-sm flex justify-between items-center sticky top-0 z-50">
                <span className="font-bold text-xl text-slate-800">{userData.profile.name}</span>
                <button onClick={() => setIsMenuOpen(!isMenuOpen)} className="text-slate-600">{isMenuOpen ? <X /> : <Menu />}</button>
              </div>

              <aside className={`fixed inset-0 md:static md:inset-auto md:w-72 bg-white border-r border-slate-200 p-6 flex flex-col z-40 transition-transform duration-300 ease-in-out ${isMenuOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'}`}>
                <div className="mb-10 text-center md:text-left">
                  {userData.profile.image && (
                      <img src={userData.profile.image} alt={userData.profile.name} className="w-32 h-32 rounded-full mx-auto md:mx-0 mb-4 shadow-lg object-cover border-4 border-white ring-1 ring-slate-100"
                        onError={(e) => { e.target.style.display = 'none'; e.target.nextSibling.style.display = 'flex'; }} />
                  )}
                  <div className="w-32 h-32 bg-gradient-to-br from-blue-500 to-purple-600 rounded-full mx-auto md:mx-0 mb-4 shadow-lg flex items-center justify-center text-white text-4xl font-bold" style={{ display: userData.profile.image ? 'none' : 'flex' }}>
                    {userData.profile.name.charAt(0)}
                  </div>
                  <h1 className="text-2xl font-bold text-slate-900">{userData.profile.name}</h1>
                  <p className="text-slate-500 text-sm mt-1">{userData.profile.role}</p>
                  
                  <div className="flex flex-wrap gap-2 mt-6 justify-center md:justify-start">
                    {userData.profile.social.github && (
                        <a href={userData.profile.social.github} target="_blank" rel="noopener noreferrer" className="flex items-center px-3 py-2 bg-gray-900 text-white rounded-md hover:bg-gray-700 transition-colors text-sm font-medium w-full md:w-auto mb-1">
                            <Github size={16} className="mr-2"/> GitHub
                        </a>
                    )}
                    {userData.profile.social.linkedin && (
                        <a href={userData.profile.social.linkedin} target="_blank" rel="noopener noreferrer" className="flex items-center px-3 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition-colors text-sm font-medium w-full md:w-auto mb-1">
                            <Linkedin size={16} className="mr-2"/> LinkedIn
                        </a>
                    )}
                    {userData.profile.social.researchgate && (
                        <a href={userData.profile.social.researchgate} target="_blank" rel="noopener noreferrer" className="flex items-center px-3 py-2 bg-emerald-500 text-white rounded-md hover:bg-emerald-600 transition-colors text-sm font-medium w-full md:w-auto mb-1">
                            <BookOpen size={16} className="mr-2"/> ResearchGate
                        </a>
                    )}
                  </div>

                  <div className="mt-6 pt-6 border-t border-slate-100 text-sm text-slate-600 space-y-3">
                    <div className="flex items-center justify-center md:justify-start">
                        <MapPin size={16} className="mr-2 flex-shrink-0 text-slate-400"/> 
                        {userData.profile.location}
                    </div>
                    <div className="flex items-start justify-center md:justify-start">
                        <Mail size={16} className="mr-2 mt-1 flex-shrink-0 text-slate-400"/> 
                        <div className="flex flex-col text-left">
                            {Array.isArray(userData.profile.email) 
                                ? userData.profile.email.map((email, idx) => <a key={idx} href={`mailto:${email}`} className="hover:text-blue-600 break-all">{email}</a>)
                                : <a href={`mailto:${userData.profile.email}`} className="hover:text-blue-600 break-all">{userData.profile.email}</a>
                            }
                        </div>
                    </div>
                  </div>
                </div>

                <nav className="flex-1 space-y-2">
                  <NavItem id="about" name="Profile" icon={User} />
                  <NavItem id="experience" name="Experience" icon={Briefcase} />
                  <NavItem id="selectedProjects" name="Selected Projects" icon={Folder} />
                  <NavItem id="internships" name="Internships" icon={GraduationCap} />
                  <NavItem id="openSourceTools" name="Open-Source Tools" icon={Code} />
                  <NavItem id="publications" name="Publications" icon={BookOpen} />
                  <NavItem id="presentations" name="Presentations" icon={Mic} />
                </nav>
                <div className="mt-auto pt-6 border-t border-slate-100 text-xs text-slate-400 text-center md:text-left">&copy; 2026 {userData.profile.name}</div>
              </aside>

              <main className="flex-1 p-6 md:p-12 max-w-4xl mx-auto w-full overflow-y-auto">{renderContent()}</main>
            </div>
          );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
