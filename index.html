<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelin Zhong - Portfolio</title>

    <!-- 1. Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- 2. React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- 3. Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 4. Custom Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-50">

    <div id="root"></div>

    <!-- Load order matters: data & icons first, then components, then App -->

    <!-- Data -->
    <script type="text/babel" src="data.js"></script>

    <!-- Icons -->
    <script type="text/babel" src="icons.js"></script>

    <!-- Section Components -->
    <script type="text/babel" src="components/sections/About.js"></script>
    <script type="text/babel" src="components/sections/Experience.js"></script>
    <script type="text/babel" src="components/sections/SelectedProjects.js"></script>
    <script type="text/babel" src="components/sections/Internships.js"></script>
    <script type="text/babel" src="components/sections/OpenSourceTools.js"></script>
    <script type="text/babel" src="components/sections/Certifications.js"></script>
    <script type="text/babel" src="components/sections/Publications.js"></script>
    <script type="text/babel" src="components/sections/Presentations.js"></script>

    <!-- Sidebar Component -->
    <script type="text/babel" src="components/Sidebar.js"></script>

    <!-- Root App -->
    <script type="text/babel" src="App.js"></script>

</body>
</html>
